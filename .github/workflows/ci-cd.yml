name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8
      - run: flake8 app.py wsgi.py --max-line-length=120

  deploy:
    name: Deploy to PythonAnywhere
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Git pull via PythonAnywhere console API
        run: |
          CONSOLE_ID=$(curl -s -X POST \
            -H "Authorization: Token ${{ secrets.PYTHONANYWHERE_API_TOKEN }}" \
            -d "executable=bash" \
            https://www.pythonanywhere.com/api/v0/user/rafroz123/consoles/ \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          curl -s -X POST \
            -H "Authorization: Token ${{ secrets.PYTHONANYWHERE_API_TOKEN }}" \
            -d "input=cd ~/myNew_Claude_Project && git pull origin main && echo __DONE__\n" \
            "https://www.pythonanywhere.com/api/v0/user/rafroz123/consoles/${CONSOLE_ID}/send_input/"

          sleep 20

          curl -s -X DELETE \
            -H "Authorization: Token ${{ secrets.PYTHONANYWHERE_API_TOKEN }}" \
            "https://www.pythonanywhere.com/api/v0/user/rafroz123/consoles/${CONSOLE_ID}/"

      - name: Reload web app
        run: |
          curl -s -f -X POST \
            -H "Authorization: Token ${{ secrets.PYTHONANYWHERE_API_TOKEN }}" \
            https://www.pythonanywhere.com/api/v0/user/rafroz123/webapps/rafroz123.pythonanywhere.com/reload/
